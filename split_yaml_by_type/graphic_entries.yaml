- abstract: "The high mapping resolution of multiparental populations, combined with\
    \ technology to measure tens of thousands of phenotypes, presents a need for quantitative\
    \ methods to enhance understanding of the genetic architecture of complex traits.\
    \ When multiple traits map to a common genomic region, knowledge of the number\
    \ of distinct loci provides important insight into the underlying mechanism and\
    \ can assist planning for subsequent experiments. We extend the method of Jiang\
    \ and Zeng (1995), for testing pleiotropy with a pair of traits, to the case of\
    \ more than two alleles. We also incorporate polygenic random effects to account\
    \ for population structure. We use a parametric bootstrap to determine statistical\
    \ signi\uFB01cance. We apply our methods to a behavioral genetics data set from\
    \ Diversity Outbred mice. Our methods have been incorporated into the R package\
    \ qtl2pleio."
