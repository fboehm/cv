- abstract: Niemann-Pick disease type C1 (NPC1) is a rare, fatal
    neurodegenerative disorder characterized by lysosomal accumulation
    of unesterified cholesterol and glycosphingolipids. These
    subcellular pathologies lead to phenotypes of hepatosplenomegaly,
    neurological degeneration and premature death. NPC1 is extremely
    heterogeneous in the timing of clinical presentation and is
    associated with a wide spectrum of causative NPC1 mutations. To
    study the genetic architecture of NPC1, we have generated a new NPC1
    mouse model, Npc1em1Pav. Npc1em1Pav/em1Pav mutants showed notably
    reduced NPC1 protein compared to controls and displayed the
    pathological and biochemical hallmarks of NPC1. Interestingly,
    Npc1em1Pav/em1Pav mutants on a C57BL/6J genetic background showed
    more severe visceral pathology and a significantly shorter lifespan
    compared to Npc1em1Pav/em1Pav mutants on a BALB/cJ background,
    suggesting that strain-specific modifiers contribute to disease
    severity and survival. QTL analysis for lifespan of 202 backcross N2
    mutants on a mixed C57BL/6J and BALB/cJ background detected
    significant linkage to markers on chromosomes 1 and 7. The discovery
    of these modifier regions demonstrates that mouse models are
    powerful tools for analyzing the genetics underlying rare human
    diseases, which can be used to improve understanding of the
    variability in NPC1 phenotypes and advance options for patient
    diagnosis and therapy.
