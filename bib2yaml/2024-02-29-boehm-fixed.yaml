- abstract: "Methods: Women who accessed healthcare services at this
    center between June 1999 and December 2002 were recruited to
    participate. The analysis was based on data from a case-control
    study of sexually transmitted diseases (STDs) in rural Haiti. HIV
    prevalence in the study population was 4%. Results: In multivariate
    analyses, partner occupation was associated with HIV infection in
    women, with mechanic (OR 9.0, 95% CI 1.8-45) and market vendor (OR
    4.2, 95% CI 1.6-11) reﬂecting the strongest partner occupational
    risk factors. Partner's occupation as a farmer reduced the risk of
    infection in women by 60% (95% CI 0.14-1.1). Factors indicating low
    socioeconomic status (SES), such as food insecurity (OR 2.0, 95% CI
    0.75-5.6) and using charcoal for cooking (OR 1.7, 95% CI 0.72-3.8)
    suggested an association with HIV infection. Conclusions: Given
    pervasive gender inequality in Haiti, women's economic security
    often relies on their partners' income earning activities. Our
    ﬁndings show that although factors reﬂecting poverty are associated
    with HIV-positive status, stronger associations are observed for
    women whose partners indicated a more secure occupation (e.g.,
    mechanic or market vendor). Policies and programs that expand access
    to education and economic opportunities for women and girls may have
    long-term implications for HIV prevention in Haiti and other
    resource-poor settings."
