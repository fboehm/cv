- abstract: Genome-wide association studies have yielded thousands of
    associations for many common diseases and disease-related complex
    traits. The identiﬁed associations made it possible to identify the
    causal risk factors underlying diseases and investigate the causal
    relationships among complex traits through Mendelian randomization.
    Mendelian randomization is a form of instrumental variable analysis
    that uses SNP associations from genome-wide association studies as
    instruments to study and uncover causal relationships between
    complex traits. By leveraging SNP genotypes as instrumental
    variables, or proxies, for the exposure complex trait, investigators
    can tease out causal effects from observational data, provided that
    necessary assumptions are satisﬁed. We discuss below the development
    of Mendelian randomization methods in parallel with the growth of
    genome-wide association studies. We argue that the recent
    availability of GWAS summary statistics for diverse complex traits
    has motivated new Mendelian randomization methods with relaxed
    causality assumptions and that this area continues to offer
    opportunities for robust biological discoveries.
