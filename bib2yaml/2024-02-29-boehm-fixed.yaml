- abstract: Abstract During mitosis, duplicated sister chromatids attach
    to microtubules emanating from opposing sides of the bipolar spindle
    through large protein complexes called kinetochores. In the absence
    of stable kinetochore--microtubule attachments, a cell surveillance
    mechanism known as the spindle assembly checkpoint (SAC) produces an
    inhibitory signal that prevents anaphase onset. Precisely how the
    inhibitory SAC signal is extinguished in response to microtubule
    attachment remains unresolved. To address this, we induced formation
    of hyper-stable kinetochore--microtubule attachments in human cells
    using a non-phosphorylatable version of the protein Hec1, a core
    component of the attachment machinery. We find that stable
    attachments are sufficient to silence the SAC in the absence of
    sister kinetochore bi-orientation and strikingly in the absence of
    detectable microtubule pulling forces or tension. Furthermore, we
    find that SAC satisfaction occurs despite the absence of large
    changes in intra-kinetochore distance, suggesting that substantial
    kinetochore stretching is not required for quenching the SAC signal.
  accessed: 2024-01-07
