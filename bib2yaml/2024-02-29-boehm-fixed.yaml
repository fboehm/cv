- abstract: "AbstractGenome‐wide scans of nucleotide variation in human
    subjects are providing an increasing number of replicated
    associations with complex disease traits. Most of the variants
    detected have small effects and, collectively, they account for a
    small fraction of the total genetic variance. Very large sample
    sizes are required to identify and validate findings. In this
    situation, even small sources of systematic or random error can
    cause spurious results or obscure real effects. The need for careful
    attention to data quality has been appreciated for some time in this
    field, and a number of strategies for quality control and quality
    assurance (QCQC/QAQA) have been developed. Here we extend these
    methods and describe a system of QCQC/QAQA for genotypic data in
    genome‐wide association studies (GWASGWAS). This system includes
    some new approaches that (1) combine analysis of allelic probe
    intensities and called genotypes to distinguish gender
    misidentification from sex chromosome aberrations, (2) detect
    autosomal chromosome aberrations that may affect genotype calling
    accuracy, (3) infer DNADNA sample quality from relatedness and
    allelic intensities, (4) use duplicate concordance to infer SNPSNP
    quality, (5) detect genotyping artifacts from dependence of
    Hardy‐Weinberg equilibrium test P ‐values on allelic frequency, and
    (6) demonstrate sensitivity of principal components analysis to
    SNPSNP selection. The methods are illustrated with examples from the
    \"Gene Environment Association Studies\"Gene Environment Association
    Studies (GENEVAGENEVA) program. The results suggest several
    recommendations for QCQC/QAQA in the design and execution of
