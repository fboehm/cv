- abstract: Modern quantitative trait locus (QTL) studies in
    multiparental populations offer opportunities to identify causal
    genes for thousands of clinical and molecular traits. Traditional
    analyses examine each trait by itself. However, to fully leverage
    this vast number of measured traits, the systems genetics community
    needs statistical tools to analyze multiple traits simultaneously
    (Jiang & Zeng, 1995; Korol, Ronin, & Kirzhner, 1995). A test of
    pleiotropy vs. separate QTL is one such tool that will aid
    dissection of complex trait genetics and enhance understanding of
    genetic architecture.
  accessed: 2024-01-07
