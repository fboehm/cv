- abstract: The microbial communities that inhabit the distal gut of
    humans and other mammals exhibit large inter-individual variation.
    While host genetics is a known factor that influences gut microbiota
    composition, the mechanisms underlying this variation remain largely
    unknown. Bile acids (BAs) are hormones that are produced by the host
    and chemically modified by gut bacteria. BAs serve as environmental
    cues and nutrients to microbes, but they can also have antibacterial
    effects. We hypothesized that host genetic variation in BA
    metabolism and homeostasis influence gut microbiota composition. To
    address this, we used the Diversity Outbred (DO) stock, a population
    of genetically distinct mice derived from eight founder strains. We
    characterized the fecal microbiota composition and plasma and cecal
    BA profiles from 400 DO mice maintained on a high-fat high-sucrose
    diet for \~22 weeks. Using quantitative trait locus (QTL) analysis,
    we identified several genomic regions associated with variations in
    both bacterial and BA profiles. Notably, we found overlapping QTL
    for Turicibacter sp. and plasma cholic acid, which mapped to a locus
    containing the gene for the ileal bile acid transporter, Slc10a2.
    Mediation analysis and subsequent follow-up validation experiments
    suggest that differences in Slc10a2 gene expression associated with
    the different strains influences levels of both traits and revealed
    novel interactions between Turicibacter and BAs. This work
    illustrates how systems genetics can be utilized to generate
    testable hypotheses and provide insight into host-microbe
    interactions.
  accessed: 2024-01-07
