- abstract: "A central goal in the analysis of complex traits is to
    identify genes that modify a phenotype. Modiﬁers of a cancer
    phenotype may act either intrinsically or extrinsically on the
    salient cell lineage. Germline point mutagenesis by ethylnitrosourea
    can provide alleles for a gene of interest that include loss-,
    gain-, or alteration-of-function. Unlike strain polymorphisms, point
    mutations with heterozygous quantitative phenotypes are detectable
    in both essential and nonessential genes and are unlinked from other
    variants that might confound their identiﬁcation and analysis. This
    report analyzes strategies seeking quantitative mutational modiﬁers
    of ApcMin in the mouse. To identify a quantitative modiﬁer of a
    phenotype of interest, a cluster of test progeny is needed. The
    cluster size can be increased as necessary for statistical
    signiﬁcance if the founder is a male whose sperm is cryopreserved. A
    second critical element in this identiﬁcation is a mapping panel
    free of polymorphic modiﬁers of the phenotype, to enable
    low-resolution mapping followed by targeted resequencing to identify
    the causative mutation. Here, we describe the development of a panel
    of six \"isogenic mapping partner lines\" for C57BL/6J, carrying
    single-nucleotide markers introduced by mutagenesis. One such
    derivative, B6.SNVg, shown to be phenotypically neutral in
    combination with ApcMin, is an appropriate mapping partner to locate
    induced mutant modiﬁers of the ApcMin phenotype. The evolved
    strategy can complement four current major initiatives in the
    genetic analysis of complex systems: the Genome-wide Association
    Study; the Collaborative Cross; the Knockout Mouse Project; and The
    Cancer Genome Atlas."
  accessed: 2024-01-07
