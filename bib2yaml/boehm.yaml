- abstract: "We explored the utility of population- and pedigree-based
    analyses using the Framingham Heart Study genome-wide 50 k
    single-nucleotide polymorphism marker data provided for Genetic
    Analysis Workshop 16. Our aims were: 1) to compare
    identity-by-descent sharing estimates from variable amounts of data;
    2) to apply each of these estimates to a case-control association
    study designed to control for relatedness among samples; and 3) to
    contrast these results to those obtained using model-based and
    model-free linkage analysis methods."
